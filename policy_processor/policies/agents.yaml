# Agent policies — Sprint 3
#
# A2A section: allowed_remote_agents
# MCP section: allowed_mcp_servers + allowed_tools per server

agents:
  # ── A2A agents (Sprint 2) ────────────────────────────────────────────────
  agent-a:
    allowed_remote_agents:
      - agent-b

  agent-b:
    allowed_remote_agents:
      - agent-a

  # ── MCP agent (Sprint 3) ─────────────────────────────────────────────────
  agent-a-mcp:
    allowed_remote_agents: []
    allowed_mcp_servers:
      - mcp-server
    allowed_tools:
      mcp-server:
        - echo
