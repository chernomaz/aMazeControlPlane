server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # The HTML shell must never be cached, otherwise a browser keeps loading the
  # previous build's hashed bundle after a redeploy (and, since the bundle name
  # changed, would 404 or run stale code). Content-hashed assets under /assets/
  # are immutable and safe to cache forever.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    expires -1;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://amaze:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
