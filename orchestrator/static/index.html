<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>aMaze Orchestrator — Chat</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0f1115; color: #e6e6e6; margin: 0; padding: 0; display: flex; height: 100vh; }
  aside { width: 260px; background: #161a22; padding: 16px; border-right: 1px solid #252a33; overflow-y: auto; }
  main { flex: 1; display: flex; flex-direction: column; }
  h1 { font-size: 16px; margin: 0 0 12px 0; color: #9ad; font-weight: 600; letter-spacing: 0.02em; }
  .agent { padding: 8px 10px; margin-bottom: 6px; border-radius: 6px; background: #202632; cursor: pointer; font-size: 13px; }
  .agent.active { background: #2a3445; border: 1px solid #4a6; }
  .agent .pill { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 10px; background: #444; margin-left: 6px; }
  .agent .pill.RUNNING { background: #2a7a3a; }
  .agent .pill.PENDING { background: #8a6a1a; }
  header { padding: 12px 20px; background: #161a22; border-bottom: 1px solid #252a33; font-size: 14px; }
  #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #2a4a8a; }
  .msg.agent { align-self: flex-start; background: #27313f; }
  .msg.err { align-self: flex-start; background: #5a1e1e; }
  footer { padding: 12px 20px; background: #161a22; border-top: 1px solid #252a33; display: flex; gap: 8px; }
  input[type=text] { flex: 1; padding: 10px 12px; border-radius: 6px; border: 1px solid #2a3344; background: #0f1115; color: #e6e6e6; font-size: 14px; }
  button { padding: 10px 16px; border-radius: 6px; border: 0; background: #3a5fb5; color: white; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<aside>
  <h1>Agents</h1>
  <div id="agents"></div>
  <p style="font-size:11px;opacity:0.6;margin-top:16px;">Click an agent to chat. Only RUNNING agents accept messages.</p>
</aside>
<main>
  <header id="header">Select an agent</header>
  <div id="messages"></div>
  <footer>
    <input id="input" type="text" placeholder="Type a message…" disabled autofocus>
    <button id="send" disabled>Send</button>
  </footer>
</main>

<script>
let selectedAgent = null;

async function refreshAgents() {
  const r = await fetch('/agents');
  const { agents } = await r.json();
  const list = document.getElementById('agents');
  list.innerHTML = '';
  (agents || []).forEach(a => {
    const div = document.createElement('div');
    div.className = 'agent' + (selectedAgent === a.agent_id ? ' active' : '');
    const name = document.createElement('span');
    name.textContent = a.agent_id;
    const pill = document.createElement('span');
    pill.className = 'pill ' + (a.status || '');
    pill.textContent = a.status || '';
    div.append(name, ' ', pill);
    div.onclick = () => selectAgent(a);
    list.appendChild(div);
  });
}

function selectAgent(a) {
  selectedAgent = a.agent_id;
  document.getElementById('header').textContent = `${a.agent_id} — ${a.status}`;
  document.getElementById('input').disabled = (a.status !== 'RUNNING');
  document.getElementById('send').disabled = (a.status !== 'RUNNING');
  document.getElementById('messages').innerHTML = '';
  refreshAgents();
}

async function sendMessage() {
  if (!selectedAgent) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  appendMsg('user', text);
  input.value = '';
  try {
    const r = await fetch(`/agents/${selectedAgent}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await r.json();
    if (r.ok && data.reply) {
      appendMsg('agent', data.reply);
    } else {
      appendMsg('err', `[${r.status}] ${JSON.stringify(data)}`);
    }
  } catch (e) {
    appendMsg('err', e.toString());
  }
}

function appendMsg(cls, text) {
  const m = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  m.appendChild(div);
  m.scrollTop = m.scrollHeight;
}

document.getElementById('send').onclick = sendMessage;
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

refreshAgents();
setInterval(refreshAgents, 3000);
</script>
</body>
</html>
