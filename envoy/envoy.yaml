static_resources:

  listeners:
    - name: main
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress
                route_config:
                  name: local_routes
                  virtual_hosts:
                    - name: agent_a
                      domains: ["agent-a"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: agent_a_cluster }
                    - name: agent_b
                      domains: ["agent-b"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: agent_b_cluster }
                    - name: mcp_server
                      domains: ["mcp-server"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mcp_server_cluster }
                    - name: search_mcp
                      domains: ["search-mcp"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: search_mcp_cluster }
                    - name: openai_api
                      domains: ["openai-api"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: openai_cluster
                            host_rewrite_literal: "api.openai.com"
                http_filters:
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc:
                          cluster_name: policy_processor
                      failure_mode_allow: false
                      processing_mode:
                        request_header_mode: SEND
                        response_header_mode: SKIP
                        request_body_mode: BUFFERED
                        response_body_mode: BUFFERED
                        request_trailer_mode: SKIP
                        response_trailer_mode: SKIP
                      message_timeout: 5s
                      max_message_timeout: 10s
                      allow_mode_override: false
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: agent_a_cluster
      connect_timeout: 5s
      type: STATIC
      load_assignment:
        cluster_name: agent_a_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 9001

    - name: agent_b_cluster
      connect_timeout: 5s
      type: STATIC
      load_assignment:
        cluster_name: agent_b_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 9002

    - name: mcp_server_cluster
      connect_timeout: 5s
      type: STATIC
      load_assignment:
        cluster_name: mcp_server_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 9003

    - name: search_mcp_cluster
      connect_timeout: 5s
      type: STATIC
      load_assignment:
        cluster_name: search_mcp_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 9004

    - name: openai_cluster
      connect_timeout: 30s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: api.openai.com
      load_assignment:
        cluster_name: openai_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: api.openai.com
                      port_value: 443

    - name: policy_processor
      connect_timeout: 5s
      type: STATIC
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: policy_processor
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 50051

overload_manager:
  resource_monitors:
    - name: envoy.resource_monitors.global_downstream_max_connections
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.resource_monitors.downstream_connections.v3.DownstreamConnectionsConfig
        max_active_downstream_connections: 50000

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
