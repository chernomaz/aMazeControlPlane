# Network isolation that makes "proxy-only egress" enforceable by Docker.
#
# Three networks:
#   amaze-agent-net  — internal=true, no host/internet reachability. Agents +
#                      proxy live here. Agent containers have no route OUT
#                      except to peers on this net, which is just the proxy.
#   amaze-mcp-net    — internal=true. MCP servers + proxy. Agents have NO
#                      route here — MCP is reachable only through the proxy,
#                      which is the single node straddling both internal nets.
#   amaze-egress     — external bridge; ONLY the proxy joins it. The proxy's
#                      outbound LLM / HTTPS traffic leaves here.
#
# Compose this file with the platform compose file:
#   docker compose -f docker-compose.yml -f docker/compose.networks.yml up

name: amaze

networks:
  amaze-agent-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24

  amaze-mcp-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.31.0.0/24

  amaze-egress:
    driver: bridge
