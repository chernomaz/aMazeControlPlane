# Top-level compose for the aMaze platform.
#
# Network model:
#   No internal-bridge isolation. The platform exposes its proxy + orchestrator
#   ports to the host. Agents (running anywhere — same host, different host,
#   different network) connect by IP/DNS via HTTP_PROXY / AMAZE_ORCHESTRATOR_URL.
#
#   On the same host, agent containers reach the platform via
#   `host.docker.internal:<port>` (extra_hosts mapping in agent compose handles
#   Linux). On a different host, agents set the public/LAN address of the
#   platform.
#
# Compose:
#   docker compose -f docker/docker-compose.yml up
#
# Layer the agents on top:
#   docker compose -f docker/docker-compose.yml -f examples/compose.yml up

name: amaze

services:
  amaze-redis:
    image: redis/redis-stack-server:latest
    container_name: amaze-redis
    ports:
      # Bind to localhost only — not exposed beyond the host.
      # Platform reaches Redis via Docker DNS: redis://amaze-redis:6379
      - "127.0.0.1:6379:6379"
    volumes:
      - amaze-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  amaze:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: amaze-platform
    extra_hosts:
      # Lets the platform's proxy reach agent A2A endpoints and Redis via
      # host.docker.internal on Linux (Docker Desktop resolves natively).
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"     # orchestrator
      - "8080:8080"     # mitmproxy — agents' HTTP_PROXY target
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
    volumes:
      - amaze-proxy-ca:/opt/mitmproxy
      - amaze-jaeger-data:/data/jaeger
    environment:
      REDIS_URL: redis://amaze-redis:6379
      AMAZE_PROXY_URL: http://localhost:8080
      # Default admin for the demo. On a FRESH boot (no existing admin) this
      # creates admin/admin. Override both in any real deployment.
      AMAZE_ADMIN_USER: admin
      AMAZE_ADMIN_PASSWORD: admin
      # PII redaction backend: `regex` (small footprint) or `ner` (spaCy
      # en_core_web_lg, baked into the image). NER catches bare city names,
      # uncommon single-word names, and disambiguates PERSON vs LOCATION via
      # word-vector context; ~500 MB extra RSS and ~+30-60 ms per redact() call.
      # Override the model with PII_SPACY_MODEL (see pii_engine.py); the image
      # only bakes in the default, so switching models needs an image rebuild.
      PII_NLP_MODE: ner
    depends_on:
      amaze-redis:
        condition: service_healthy
    restart: unless-stopped

  amaze-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    container_name: amaze-ui
    ports:
      - "5173:80"      # browser → http://localhost:5173
    depends_on:
      - amaze
    restart: unless-stopped

volumes:
  amaze-proxy-ca:
  amaze-redis-data:
  amaze-jaeger-data:
