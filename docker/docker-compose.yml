# Top-level compose for the single-container aMaze platform.
#
# What runs where:
#
#   amaze (this container)    — redis + orchestrator + proxy under supervisord.
#                               Straddles agent-net, mcp-net, egress.
#
#   agent containers          — user-started, outside our control. Must attach
#                               to amaze-agent-net and call POST /register on
#                               the orchestrator at boot to obtain a bearer
#                               token. See docker/Dockerfile.agent-base for a
#                               ready-made base image.
#
#   MCP containers            — same model. Attach to amaze-mcp-net, call
#                               POST /register?kind=mcp on the orchestrator to
#                               announce name + tool list. See
#                               docker/Dockerfile.mcp-base.
#
# The proxy is the only node that can cross from agent-net to mcp-net and the
# only node with a route to the public internet. Orchestrator does NOT spawn
# sibling containers — no Docker socket mount is needed or wanted.
#
# Compose with the network definitions:
#   docker compose -f docker/docker-compose.yml -f docker/compose.networks.yml up

name: amaze

services:
  amaze:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: amaze-platform
    networks:
      - amaze-agent-net
      - amaze-mcp-net
      - amaze-egress
    ports:
      # Orchestrator HTTP: POST /register, GET /resolve/*, stats endpoints.
      - "8001:8001"
      # Proxy is reachable by siblings over the internal nets by DNS name
      # `amaze`. Not exposed to the host.
    volumes:
      # Named volume for the mitmproxy CA. Written inside the proxy process
      # at /opt/mitmproxy on first boot; user-started sibling containers
      # mount this volume read-only at /etc/amaze/ca so they trust the
      # proxy's re-signed certs.
      - amaze-proxy-ca:/opt/mitmproxy
      # Redis AOF.
      - amaze-redis-data:/data/redis
    environment:
      AMAZE_PROXY_URL: http://amaze:8080
      AMAZE_PROXY_CA_VOLUME: amaze-proxy-ca
    restart: unless-stopped

volumes:
  amaze-proxy-ca:
  amaze-redis-data:

# Networks are defined in docker/compose.networks.yml. Compose them together
# at `docker compose up` time.
