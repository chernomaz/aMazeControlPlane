; Single-container process tree for the aMaze platform.
;
; Process order (priority lower = starts earlier):
;   20  orchestrator           — FastAPI: /register, /resolve/*, /health.
;                                Must be up before the proxy so the policy
;                                addon can bootstrap (load YAMLs, open
;                                Redis connection).
;   30  proxy                  — mitmproxy + policy addon. Last so that
;                                downstream dependencies are already warm.
;
; Redis runs in its own container (amaze-redis) — see docker/docker-compose.yml.
;
; `autorestart=true` everywhere: a crashed process should come back. Logs
; go to /var/log/amaze/{name}.log so `docker logs` + host bind-mount give
; operators a unified view.

[supervisord]
nodaemon=true
logfile=/var/log/amaze/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

; --- orchestrator ---------------------------------------------------------
[program:orchestrator]
command=/usr/local/bin/uvicorn services.orchestrator.main:app --host 0.0.0.0 --port 8001 --no-access-log
directory=/app
user=amaze
environment=PYTHONPATH="/app",REDIS_URL="%(ENV_REDIS_URL)s",CONFIG_DIR="/app/config"
priority=20
autorestart=true
stdout_logfile=/var/log/amaze/orchestrator.log
stderr_logfile=/var/log/amaze/orchestrator.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

; --- jaeger (all-in-one: query + collector + agent) -----------------------
[program:jaeger]
command=/usr/local/bin/jaeger-all-in-one
user=amaze
priority=25
autorestart=true
stdout_logfile=/var/log/amaze/jaeger.log
stderr_logfile=/var/log/amaze/jaeger.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=SPAN_STORAGE_TYPE="badger",BADGER_EPHEMERAL="false",BADGER_DIRECTORY_VALUE="/data/jaeger/data",BADGER_DIRECTORY_KEY="/data/jaeger/keys",COLLECTOR_OTLP_ENABLED="true",HOME="/data/jaeger"

; --- proxy (mitmproxy + addons) ------------------------------------------
[program:proxy]
command=/usr/local/bin/mitmdump
    --listen-host 0.0.0.0
    --listen-port 8080
    --set confdir=/opt/mitmproxy
    --set block_global=false
    -s services/proxy/main.py
directory=/app
user=amaze
environment=PYTHONPATH="/app",REDIS_URL="%(ENV_REDIS_URL)s",ORCHESTRATOR_URL="http://127.0.0.1:8001",CONFIG_DIR="/app/config",HOME="/opt/mitmproxy"
priority=30
autorestart=true
stdout_logfile=/var/log/amaze/proxy.log
stderr_logfile=/var/log/amaze/proxy.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
